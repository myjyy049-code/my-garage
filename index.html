<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>マイガレージ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: #222222;
    --accent: #ff6b00;
    --accent2: #ff9500;
    --text: #f0f0f0;
    --text2: #888888;
    --engine: #ff4444;
    --drive: #44aaff;
    --electric: #ffdd00;
    --success: #44ff88;
    --danger: #ff4444;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
  }

  /* ===== LOGIN ===== */
  #login-screen {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at 50% 0%, #1a0a00 0%, #0a0a0a 70%);
    padding: 2rem;
  }
  .login-logo {
    font-family: 'Rajdhani', sans-serif;
    font-size: 3.5rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-shadow: 0 0 40px rgba(255,107,0,0.5);
    margin-bottom: 0.5rem;
  }
  .login-sub {
    color: var(--text2);
    font-size: 0.85rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-bottom: 3rem;
  }
  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: 2px solid var(--accent);
    padding: 2.5rem;
    width: 100%;
    max-width: 380px;
    border-radius: 4px;
  }
  .login-card h2 {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.3rem;
    letter-spacing: 0.1em;
    margin-bottom: 1.5rem;
    color: var(--text2);
    text-transform: uppercase;
  }
  .google-btn {
    width: 100%;
    padding: 0.9rem;
    background: #fff;
    color: #333;
    border: none;
    border-radius: 4px;
    font-size: 0.95rem;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.75rem;
    transition: opacity 0.2s;
  }
  .google-btn:hover { opacity: 0.9; }
  .google-icon {
    width: 20px; height: 20px;
  }

  /* ===== APP ===== */
  #app-screen { display: none; }
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 1.5rem;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-logo {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.15em;
  }
  .header-user {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }
  .avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.8rem;
    font-weight: 700;
    color: #000;
  }
  .logout-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text2);
    padding: 0.3rem 0.8rem;
    border-radius: 3px;
    font-size: 0.8rem;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    transition: all 0.2s;
  }
  .logout-btn:hover { border-color: var(--accent); color: var(--accent); }

  .main { padding: 1.5rem; max-width: 900px; margin: 0 auto; }

  /* ===== BIKE CARD ===== */
  .bike-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 4px;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
  }
  .bike-card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 1rem;
  }
  .bike-name {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.05em;
  }
  .bike-meta { color: var(--text2); font-size: 0.85rem; margin-top: 0.2rem; }
  .edit-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text2);
    padding: 0.4rem 0.9rem;
    border-radius: 3px;
    font-size: 0.8rem;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    transition: all 0.2s;
  }
  .edit-btn:hover { border-color: var(--accent); color: var(--accent); }
  .bike-specs {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 1rem;
  }
  .spec-item label {
    display: block;
    font-size: 0.7rem;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 0.25rem;
  }
  .spec-item span {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.2rem;
    font-weight: 600;
  }
  .no-bike {
    text-align: center;
    padding: 3rem;
    color: var(--text2);
  }
  .register-btn {
    background: var(--accent);
    color: #000;
    border: none;
    padding: 0.8rem 2rem;
    border-radius: 3px;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    margin-top: 1rem;
    transition: opacity 0.2s;
  }
  .register-btn:hover { opacity: 0.85; }

  /* ===== TABS ===== */
  .tabs {
    display: flex;
    gap: 0;
    margin-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
  }
  .tab {
    padding: 0.75rem 1.25rem;
    background: none;
    border: none;
    color: var(--text2);
    font-size: 0.9rem;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--text); border-bottom-color: var(--accent); }
  .tab-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
  }
  .tab-dot.engine { background: var(--engine); }
  .tab-dot.drive { background: var(--drive); }
  .tab-dot.electric { background: var(--electric); }

  /* ===== RECORDS ===== */
  .section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
  }
  .section-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text2);
  }
  .add-btn {
    background: var(--accent);
    color: #000;
    border: none;
    padding: 0.5rem 1rem;
    border-radius: 3px;
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    transition: opacity 0.2s;
  }
  .add-btn:hover { opacity: 0.85; }

  .record-list { display: flex; flex-direction: column; gap: 0.75rem; }
  .record-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1rem 1.25rem;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 0.5rem;
    align-items: start;
  }
  .record-title { font-weight: 500; font-size: 0.95rem; }
  .record-meta {
    font-size: 0.8rem;
    color: var(--text2);
    margin-top: 0.25rem;
    display: flex;
    gap: 1rem;
  }
  .record-date {
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.9rem;
    color: var(--text2);
    text-align: right;
  }
  .record-km {
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.85rem;
    color: var(--accent);
    text-align: right;
  }
  .delete-btn {
    background: none;
    border: none;
    color: var(--text2);
    cursor: pointer;
    font-size: 1rem;
    padding: 0.2rem;
    transition: color 0.2s;
    align-self: center;
    margin-left: 0.5rem;
  }
  .delete-btn:hover { color: var(--danger); }
  .empty-msg {
    text-align: center;
    padding: 2rem;
    color: var(--text2);
    font-size: 0.9rem;
    border: 1px dashed var(--border);
    border-radius: 4px;
  }

  /* ===== MODAL ===== */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: 2px solid var(--accent);
    border-radius: 4px;
    padding: 2rem;
    width: 100%;
    max-width: 480px;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal h3 {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.3rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 1.5rem;
  }
  .form-group { margin-bottom: 1.2rem; }
  .form-group label {
    display: block;
    font-size: 0.8rem;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 0.4rem;
  }
  .form-group input,
  .form-group select,
  .form-group textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.7rem 0.9rem;
    border-radius: 3px;
    font-size: 0.9rem;
    font-family: 'Noto Sans JP', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus { border-color: var(--accent); }
  .form-group select option { background: var(--surface2); }
  .form-group textarea { resize: vertical; min-height: 80px; }
  .modal-btns {
    display: flex;
    gap: 0.75rem;
    margin-top: 1.5rem;
    justify-content: flex-end;
  }
  .btn-cancel {
    background: none;
    border: 1px solid var(--border);
    color: var(--text2);
    padding: 0.6rem 1.2rem;
    border-radius: 3px;
    font-size: 0.9rem;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .btn-save {
    background: var(--accent);
    color: #000;
    border: none;
    padding: 0.6rem 1.5rem;
    border-radius: 3px;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    transition: opacity 0.2s;
  }
  .btn-save:hover { opacity: 0.85; }

  /* ===== LOADING ===== */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.5rem;
    color: var(--accent);
    letter-spacing: 0.2em;
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 600px) {
    .main { padding: 1rem; }
    .tab { padding: 0.6rem 0.9rem; font-size: 0.82rem; }
    .bike-name { font-size: 1.4rem; }
  }
</style>
</head>
<body>

<div class="loading" id="loading">LOADING...</div>
<div id="login-screen" style="display:none">
  <div class="login-logo">MY GARAGE</div>
  <div class="login-sub">バイクメンテナンス管理</div>
  <div class="login-card">
    <h2>サインイン</h2>
    <button class="google-btn" onclick="loginWithGoogle()">
      <svg class="google-icon" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Googleでログイン
    </button>
  </div>
</div>

<div id="app-screen" style="display:none">
  <div class="header">
    <div class="header-logo">MY GARAGE</div>
    <div class="header-user">
      <div class="avatar" id="user-avatar">U</div>
      <button class="logout-btn" onclick="logout()">ログアウト</button>
    </div>
  </div>
  <div class="main">
    <!-- バイク情報 -->
    <div id="bike-section"></div>

    <!-- メンテ記録 -->
    <div id="records-section" style="display:none">
      <div class="tabs">
        <button class="tab active" onclick="switchTab('engine', this)">
          <span class="tab-dot engine"></span>エンジン系
        </button>
        <button class="tab" onclick="switchTab('drive', this)">
          <span class="tab-dot drive"></span>駆動系
        </button>
        <button class="tab" onclick="switchTab('electric', this)">
          <span class="tab-dot electric"></span>電気系
        </button>
      </div>
      <div class="section-header">
        <div class="section-title" id="current-category-label">エンジン系</div>
        <button class="add-btn" onclick="openAddRecord()">＋ 記録追加</button>
      </div>
      <div class="record-list" id="record-list"></div>
    </div>
  </div>
</div>

<!-- バイク登録/編集モーダル -->
<div class="modal-overlay" id="bike-modal">
  <div class="modal">
    <h3 id="bike-modal-title">バイク登録</h3>
    <div class="form-group">
      <label>車種・車名</label>
      <input type="text" id="bike-name" placeholder="例：Honda CB400SF">
    </div>
    <div class="form-group">
      <label>年式</label>
      <input type="number" id="bike-year" placeholder="例：2020">
    </div>
    <div class="form-group">
      <label>排気量 (cc)</label>
      <input type="number" id="bike-cc" placeholder="例：400">
    </div>
    <div class="form-group">
      <label>現在の走行距離 (km)</label>
      <input type="number" id="bike-km" placeholder="例：12500">
    </div>
    <div class="form-group">
      <label>メモ</label>
      <textarea id="bike-memo" placeholder="カスタム内容など自由に"></textarea>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeBikeModal()">キャンセル</button>
      <button class="btn-save" onclick="saveBike()">保存</button>
    </div>
  </div>
</div>

<!-- メンテ記録モーダル -->
<div class="modal-overlay" id="record-modal">
  <div class="modal">
    <h3>メンテ記録を追加</h3>
    <div class="form-group">
      <label>カテゴリ</label>
      <select id="record-category">
        <option value="engine">エンジン系</option>
        <option value="drive">駆動系</option>
        <option value="electric">電気系</option>
      </select>
    </div>
    <div class="form-group">
      <label>作業内容</label>
      <input type="text" id="record-title" placeholder="例：エンジンオイル交換">
    </div>
    <div class="form-group">
      <label>実施日</label>
      <input type="date" id="record-date">
    </div>
    <div class="form-group">
      <label>走行距離 (km)</label>
      <input type="number" id="record-km" placeholder="例：12500">
    </div>
    <div class="form-group">
      <label>次回予定距離 (km) ※任意</label>
      <input type="number" id="record-next-km" placeholder="例：15500">
    </div>
    <div class="form-group">
      <label>メモ</label>
      <textarea id="record-memo" placeholder="使用したパーツ、費用など"></textarea>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeRecordModal()">キャンセル</button>
      <button class="btn-save" onclick="saveRecord()">保存</button>
    </div>
  </div>
</div>

<script>
// ===== SUPABASE設定 =====
const SUPABASE_URL = 'https://owgoceocaeututmtecsz.supabase.co';
const SUPABASE_KEY = '372202519174-jb1hocvj8pti29e3n8lha30m44qbehkj.apps.googleusercontent.com';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;
let currentTab = 'engine';
let bikeData = null;

const categoryLabels = {
  engine: 'エンジン系',
  drive: '駆動系',
  electric: '電気系'
};

// ===== 初期化 =====
async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    currentUser = session.user;
    showApp();
  } else {
    showLogin();
  }
  sb.auth.onAuthStateChange((event, session) => {
    if (session) { currentUser = session.user; showApp(); }
    else { currentUser = null; showLogin(); }
  });
}

function showLogin() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app-screen').style.display = 'none';
}

async function showApp() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'block';
  const name = currentUser.user_metadata?.full_name || currentUser.email || 'U';
  document.getElementById('user-avatar').textContent = name.charAt(0).toUpperCase();
  await loadBike();
}

// ===== 認証 =====
async function loginWithGoogle() {
  await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.href }
  });
}

async function logout() {
  await sb.auth.signOut();
}

// ===== バイク =====
async function loadBike() {
  const { data } = await sb.from('bikes').select('*').eq('user_id', currentUser.id).single();
  bikeData = data;
  renderBike();
}

function renderBike() {
  const section = document.getElementById('bike-section');
  if (!bikeData) {
    section.innerHTML = `
      <div class="bike-card">
        <div class="no-bike">
          <div style="font-size:2rem;margin-bottom:0.5rem"> ?</div>
          <div>バイク情報がまだ登録されていません</div>
          <button class="register-btn" onclick="openBikeModal()">バイクを登録する</button>
        </div>
      </div>`;
    document.getElementById('records-section').style.display = 'none';
    return;
  }
  section.innerHTML = `
    <div class="bike-card">
      <div class="bike-card-header">
        <div>
          <div class="bike-name">${bikeData.name}</div>
          <div class="bike-meta">${bikeData.year || ''}年式</div>
        </div>
        <button class="edit-btn" onclick="openBikeModal(true)">編集</button>
      </div>
      <div class="bike-specs">
        <div class="spec-item"><label>排気量</label><span>${bikeData.cc || '-'} cc</span></div>
        <div class="spec-item"><label>走行距離</label><span>${bikeData.km ? bikeData.km.toLocaleString() : '-'} km</span></div>
        ${bikeData.memo ? `<div class="spec-item" style="grid-column:1/-1"><label>メモ</label><span style="font-family:inherit;font-size:0.9rem">${bikeData.memo}</span></div>` : ''}
      </div>
    </div>`;
  document.getElementById('records-section').style.display = 'block';
  loadRecords();
}

function openBikeModal(isEdit = false) {
  document.getElementById('bike-modal-title').textContent = isEdit ? 'バイク情報を編集' : 'バイクを登録';
  if (isEdit && bikeData) {
    document.getElementById('bike-name').value = bikeData.name || '';
    document.getElementById('bike-year').value = bikeData.year || '';
    document.getElementById('bike-cc').value = bikeData.cc || '';
    document.getElementById('bike-km').value = bikeData.km || '';
    document.getElementById('bike-memo').value = bikeData.memo || '';
  } else {
    ['bike-name','bike-year','bike-cc','bike-km','bike-memo'].forEach(id => document.getElementById(id).value = '');
  }
  document.getElementById('bike-modal').classList.add('open');
}

function closeBikeModal() {
  document.getElementById('bike-modal').classList.remove('open');
}

async function saveBike() {
  const payload = {
    user_id: currentUser.id,
    name: document.getElementById('bike-name').value,
    year: parseInt(document.getElementById('bike-year').value) || null,
    cc: parseInt(document.getElementById('bike-cc').value) || null,
    km: parseInt(document.getElementById('bike-km').value) || null,
    memo: document.getElementById('bike-memo').value
  };
  if (bikeData) {
    await sb.from('bikes').update(payload).eq('id', bikeData.id);
  } else {
    await sb.from('bikes').insert(payload);
  }
  closeBikeModal();
  await loadBike();
}

// ===== メンテ記録 =====
function switchTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('current-category-label').textContent = categoryLabels[tab];
  loadRecords();
}

async function loadRecords() {
  const { data } = await sb.from('maintenance_records')
    .select('*')
    .eq('user_id', currentUser.id)
    .eq('category', currentTab)
    .order('date', { ascending: false });
  renderRecords(data || []);
}

function renderRecords(records) {
  const list = document.getElementById('record-list');
  if (records.length === 0) {
    list.innerHTML = `<div class="empty-msg">まだ記録がありません。「＋ 記録追加」から追加してください。</div>`;
    return;
  }
  list.innerHTML = records.map(r => `
    <div class="record-item">
      <div>
        <div class="record-title">${r.title}</div>
        <div class="record-meta">
          ${r.km ? `<span>  ${r.km.toLocaleString()} km</span>` : ''}
          ${r.next_km ? `<span>  次回: ${r.next_km.toLocaleString()} km</span>` : ''}
          ${r.memo ? `<span>  ${r.memo}</span>` : ''}
        </div>
      </div>
      <div>
        <div class="record-date">${r.date || ''}</div>
        <button class="delete-btn" onclick="deleteRecord('${r.id}')"> </button>
      </div>
    </div>`).join('');
}

function openAddRecord() {
  document.getElementById('record-category').value = currentTab;
  document.getElementById('record-date').value = new Date().toISOString().split('T')[0];
  ['record-title','record-km','record-next-km','record-memo'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('record-modal').classList.add('open');
}

function closeRecordModal() {
  document.getElementById('record-modal').classList.remove('open');
}

async function saveRecord() {
  const payload = {
    user_id: currentUser.id,
    category: document.getElementById('record-category').value,
    title: document.getElementById('record-title').value,
    date: document.getElementById('record-date').value,
    km: parseInt(document.getElementById('record-km').value) || null,
    next_km: parseInt(document.getElementById('record-next-km').value) || null,
    memo: document.getElementById('record-memo').value
  };
  await sb.from('maintenance_records').insert(payload);
  closeRecordModal();
  currentTab = payload.category;
  document.getElementById('current-category-label').textContent = categoryLabels[currentTab];
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab')[['engine','drive','electric'].indexOf(currentTab)].classList.add('active');
  loadRecords();
}

async function deleteRecord(id) {
  if (!confirm('この記録を削除しますか？')) return;
  await sb.from('maintenance_records').delete().eq('id', id);
  loadRecords();
}

init();
</script>
